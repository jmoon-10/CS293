<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
</head>
<body>
    <h2>Submission Recieved!</h2>
    <p id="display"></p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get("form-name");
        const mail = params.get("form-mail");
        const msg = params.get("form-message");

        document.getElementById("display").innerHTML = 
            `${name} your form has successfully been submitted. <br>
            Email -> ${mail} <br>
            Message -> ${msg}`;
    </script>

    <input type="Button" value="Return to Home Page" id="home-button">
</body>
</html>
